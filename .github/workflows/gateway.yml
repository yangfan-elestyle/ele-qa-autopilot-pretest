name: gateway

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: gateway-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & Push qa gateway image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches root VERSION
        run: |
          root_version="$(cat VERSION)"
          tag="${{ github.ref_name }}"
          if [ "v${root_version}" != "${tag}" ]; then
            echo "error: tag ${tag} does not match root VERSION v${root_version}" >&2
            exit 1
          fi

      - name: Verify tag matches package.json version
        working-directory: gateway
        run: |
          pkg_version="$(jq -r .version package.json)"
          tag="${{ github.ref_name }}"
          if [ "v${pkg_version}" != "${tag}" ]; then
            echo "error: tag ${tag} does not match package.json version v${pkg_version}" >&2
            exit 1
          fi

      - name: Lowercase owner (GHCR requires lowercase)
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: gateway
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/ele-qa-gateway:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER }}/ele-qa-gateway:latest
