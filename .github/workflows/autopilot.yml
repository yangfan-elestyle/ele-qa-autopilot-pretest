name: autopilot

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: autopilot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & Push ele-autopilot image
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        working-directory: ele-autopilot
        run: |
          pkg_version="$(jq -r .version package.json)"
          tag="${{ github.ref_name }}"
          if [ "v${pkg_version}" != "${tag}" ]; then
            echo "error: tag ${tag} does not match package.json version v${pkg_version}" >&2
            exit 1
          fi

      - name: Lowercase owner (GHCR requires lowercase)
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 迁移: migrations 不再在 CI apply (库在内网容器 volume); server 首启自建表 (lib/db/migrate.ts).
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ele-autopilot
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/ele-qa-autopilot:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER }}/ele-qa-autopilot:latest
