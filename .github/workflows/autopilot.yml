name: autopilot

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: autopilot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & Push ele-autopilot image
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches root VERSION
        run: |
          root_version="$(cat VERSION)"
          tag="${{ github.ref_name }}"
          if [ "v${root_version}" != "${tag}" ]; then
            echo "error: tag ${tag} does not match root VERSION v${root_version}" >&2
            exit 1
          fi

      - name: Verify tag matches package.json version
        working-directory: ele-autopilot
        run: |
          pkg_version="$(jq -r .version package.json)"
          tag="${{ github.ref_name }}"
          if [ "v${pkg_version}" != "${tag}" ]; then
            echo "error: tag ${tag} does not match package.json version v${pkg_version}" >&2
            exit 1
          fi

      # wheel 由镜像 localwheel 阶段构建打进镜像; 校验 lockstep 版本.
      - name: Verify ele-autopilot-local version matches tag
        run: |
          pkg_version="$(python3 -c 'import tomllib; print(tomllib.load(open("ele-autopilot-local/pyproject.toml","rb"))["project"]["version"])')"
          tag="${{ github.ref_name }}"
          if [ "v${pkg_version}" != "${tag}" ]; then
            echo "error: tag ${tag} does not match ele-autopilot-local/pyproject.toml version v${pkg_version}" >&2
            exit 1
          fi

      - name: Lowercase owner (GHCR requires lowercase)
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # migrations 不在 CI apply (库在内网容器 volume); server 首启自建表 (lib/db/migrate.ts).
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ele-autopilot
          # ele-autopilot-local 源作命名上下文, Dockerfile localwheel 阶段 uv build wheel 打进镜像.
          build-contexts: |
            local=ele-autopilot-local
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/ele-qa-autopilot:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER }}/ele-qa-autopilot:latest
