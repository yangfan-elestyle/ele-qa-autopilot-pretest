name: autopilot-local

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: autopilot-local-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: ele-autopilot-local

jobs:
  release:
    name: Build and publish ele-autopilot-local
    runs-on: ubuntu-latest

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Verify tag matches pyproject.toml version
        run: |
          pkg_version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          tag="${{ github.ref_name }}"
          if [ "v${pkg_version}" != "${tag}" ]; then
            echo "error: tag ${tag} does not match pyproject.toml version v${pkg_version}" >&2
            exit 1
          fi

      - name: Build wheel and sdist
        run: uv build

      - name: Generate SHA256 checksums
        working-directory: ele-autopilot-local/dist
        run: |
          shopt -s nullglob
          files=( ele_autopilot_local-* )
          [ ${#files[@]} -gt 0 ] || { echo "no build artifacts found in dist/" >&2; exit 1; }
          sha256sum "${files[@]}" > checksums.txt
          cat checksums.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Publish artifacts to Cloudflare R2
        run: |
          set -euo pipefail
          cd dist
          tag="${{ github.ref_name }}"
          VER="${tag#v}"
          BUCKET="ele-autopilot-releases"
          WRANGLER="npx -y wrangler@latest"

          wheel="ele_autopilot_local-${VER}-py3-none-any.whl"
          sdist="ele_autopilot_local-${VER}.tar.gz"

          [ -f "${wheel}" ] || { echo "missing wheel ${wheel}" >&2; exit 1; }
          [ -f "${sdist}" ] || { echo "missing sdist ${sdist}" >&2; exit 1; }
          [ -f "checksums.txt" ] || { echo "missing checksums.txt" >&2; exit 1; }

          # wrangler v4 起 `r2 object` 默认 local 数据存储, 必须显式 --remote 才写到生产 bucket.
          ${WRANGLER} r2 object put "${BUCKET}/local/${VER}/${wheel}" --remote \
            --file "${wheel}" --content-type "application/octet-stream"
          ${WRANGLER} r2 object put "${BUCKET}/local/${VER}/${sdist}" --remote \
            --file "${sdist}" --content-type "application/gzip"
          ${WRANGLER} r2 object put "${BUCKET}/local/${VER}/checksums.txt" --remote \
            --file "checksums.txt" --content-type "text/plain; charset=utf-8"

          # latest 指针 (单行版本号, 不含 v 前缀; gateway landing 与 install.sh 据此解析)
          printf '%s' "${VER}" > latest.txt
          ${WRANGLER} r2 object put "${BUCKET}/local/latest.txt" --remote \
            --file "latest.txt" --content-type "text/plain; charset=utf-8"
