name: autopilot-local

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: autopilot-local-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: ele-autopilot-local

jobs:
  release:
    name: Build and publish ele-autopilot-local
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Verify tag matches pyproject.toml version
        run: |
          pkg_version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          tag="${{ github.ref_name }}"
          if [ "v${pkg_version}" != "${tag}" ]; then
            echo "error: tag ${tag} does not match pyproject.toml version v${pkg_version}" >&2
            exit 1
          fi

      - name: Build wheel and sdist
        run: uv build

      - name: Generate SHA256 checksums
        working-directory: ele-autopilot-local/dist
        run: |
          shopt -s nullglob
          files=( ele_autopilot_local-* )
          [ ${#files[@]} -gt 0 ] || { echo "no build artifacts found in dist/" >&2; exit 1; }
          sha256sum "${files[@]}" > checksums.txt
          cat checksums.txt

      # 迁移: CF R2 put → GitHub Release (CI 到不了内网 MinIO). 宿主侧把 Release 产物
      # mc cp 到 MinIO ele-autopilot-releases/local/<ver>/ + 更新 local/latest.txt (见 deploy/README.md).
      - name: Publish artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          gh release create "$tag" \
            dist/*.whl dist/*.tar.gz dist/checksums.txt \
            --repo "${{ github.repository }}" \
            --title "$tag" \
            --notes "ele-autopilot-local $tag — wheel/sdist/checksums. 内网分发: 宿主 mc cp 到 MinIO releases bucket." \
            || gh release upload "$tag" dist/*.whl dist/*.tar.gz dist/checksums.txt --repo "${{ github.repository }}" --clobber
