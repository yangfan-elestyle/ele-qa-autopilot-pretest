name: autotesting

on:
  push:
    tags:
      - 'v*'
    # main push 触发 cache warm-up: GitHub Actions cache 按 ref scope 隔离, tag push 写入的 cache
    # 只在该 tag scope 可见, 新 tag (e.g. v1.6.5) 看不到旧 tag (v1.6.4) 的 cache → 每次 release
    # 都 miss + 重跑 apt-get / pip install. 唯一例外: default branch (main) scope 的 cache 对
    # 其他 ref fallback restore 可见. 这里加 main trigger 让 main push 跑一次 build & save
    # 到 main scope, 后续 tag push 通过 restore-keys 兜底命中 main scope.
    branches:
      - main

concurrency:
  group: autotesting-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: ele-autotesting

jobs:
  deploy:
    name: Build & Deploy ele-autotesting
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          pkg_version="$(jq -r .version package.json)"
          tag="${{ github.ref_name }}"
          if [ "v${pkg_version}" != "${tag}" ]; then
            echo "error: tag ${tag} does not match package.json version v${pkg_version}" >&2
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ele-autotesting/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (core + ui + web)
        run: pnpm run build:cf

      # wrangler 4 内置 Cloudflare Containers 推送链路, 本身依赖本机 docker daemon.
      # buildx 提供多架构 / amd64 跨平台构建能力 (Cloudflare Containers 要求 linux/amd64).
      # install: true 把 `docker build` 替换为 `docker buildx build`, 让 wrangler 调
      # `docker build` 时自动走 BuildKit, 才能复用下面 warm 阶段加载到 buildkitd 的 layer cache.
      - uses: docker/setup-buildx-action@v3
        with:
          install: true

      # 缓存 buildx 本地 layer cache (--cache-to type=local 产物), 跨 workflow run 持久化.
      # key hash 整个 markitdown 目录 (含未来可能新增的 COPY 源文件); 精确未命中时
      # restore-keys 回退到任意前一份 markitdown cache, 仍可部分复用 layer.
      - name: Restore buildx layer cache
        id: buildx-cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-markitdown-${{ hashFiles('ele-autotesting/containers/markitdown/**') }}
          restore-keys: |
            buildx-markitdown-

      # 把磁盘 cache 喂进 buildkitd 内部 state. wrangler 之后调 `docker build`
      # (实为 buildx) 时, 同 Dockerfile + 同 context → BuildKit 按 instruction hash
      # 命中 daemon 内 layer cache, apt-get / pip install 不再重跑.
      # wrangler 不传 --cache-from, 所以必须先 warm 让 cache 进 daemon, 不能只持久化到磁盘.
      # 不论精确命中还是 restore-keys 兜底, 只要目录非空就 warm.
      - name: Warm buildkit cache
        run: |
          if [ -d /tmp/.buildx-cache ] && [ -n "$(ls -A /tmp/.buildx-cache 2>/dev/null)" ]; then
            docker buildx build \
              --platform linux/amd64 \
              --cache-from type=local,src=/tmp/.buildx-cache \
              -f containers/markitdown/Dockerfile \
              -t markitdown:warmup \
              --load \
              containers/markitdown
          else
            echo "No buildx cache present, skipping warm step."
          fi

      # D1 schema 由 packages/server/migrations/*.sql 维护, wrangler deploy 不会自动 apply.
      # 这里在 deploy 之前对 remote DB 跑一次 migrations apply (幂等), 避免首次部署或
      # 新增 migration 后 /api/sync/* 因为 storage 表缺失直接 500.
      # 仅 tag push 跑 (main push 仅 cache warm-up, 不动 prod DB).
      - name: Apply D1 migrations (remote)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @prompt-optimizer/server exec wrangler d1 migrations apply DB --remote

      # 仅 tag push 跑 (main push 仅 cache warm-up, 不部署 worker).
      - name: Deploy Worker + Container
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @prompt-optimizer/server exec wrangler deploy

      # 显式跑一次 export-only build 落盘 layer cache, 让 actions/cache@v4 post-step 上传到当前 ref scope.
      # - tag push: wrangler deploy 阶段已喂 layer 进 buildkitd, 这里 --cache-from 命中, 几秒 export.
      # - main push: 上面没跑过 deploy, buildkitd 内为空, --cache-from 找到本 step Warm 加载的 cache
      #   (若 restore 命中) 或从零跑 (首次), export 后 post-step 上传到 main scope, 喂给下次 run.
      # output type=cacheonly: 不产 image artifact, 只导出 BuildKit cache.
      - name: Persist buildx layer cache
        if: always()
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -f containers/markitdown/Dockerfile \
            --output type=cacheonly \
            containers/markitdown
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
