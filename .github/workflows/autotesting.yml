name: autotesting

on:
  push:
    tags:
      - 'v*'
    # main push 触发 buildx layer cache warm-up; GitHub Actions cache 按 ref scope 隔离,
    # 只有 default branch (main) scope 的 cache 能被其他 ref fallback restore. 仅 markitdown
    # 改动时才有意义跑 cache build, 否则纯浪费 (跳过 deploy 后没 docker build 需要 cache).
    branches:
      - main

concurrency:
  group: autotesting-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: ele-autotesting

jobs:
  deploy:
    name: Build & Deploy ele-autotesting
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # fetch-depth: 0 拉全部 history + tags, 后面 git diff prev_tag..HEAD 需要.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          pkg_version="$(jq -r .version package.json)"
          tag="${{ github.ref_name }}"
          if [ "v${pkg_version}" != "${tag}" ]; then
            echo "error: tag ${tag} does not match package.json version v${pkg_version}" >&2
            exit 1
          fi

      # 检测 markitdown 容器源码 (Dockerfile + 子文件) 自上一个 v* tag 起是否有改动.
      # changed=false: wrangler.jsonc 的 image 字段会被改写成上次 push 的 registry URI,
      #                wrangler deploy 跳过 docker build + image push, 只 deploy worker code.
      # changed=true:  正常 deploy, deploy 完后从 log 捕获新 image URI 写入 cache, 给下次复用.
      # 仅 tag push 走判断; main push 始终走 rebuild (要刷新 main scope buildx layer cache).
      - name: Detect markitdown changes since last release tag
        id: markitdown
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: ${{ github.workspace }}
        run: |
          prev=$(git tag -l 'v*' --sort=-v:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -z "$prev" ]; then
            echo "no previous v* tag found, will rebuild container"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          diff=$(git diff --name-only "$prev..HEAD" -- ele-autotesting/containers/markitdown/ || true)
          if [ -z "$diff" ]; then
            echo "markitdown/ unchanged since $prev → reuse cached image, skip build/push"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "prev_tag=$prev" >> "$GITHUB_OUTPUT"
          else
            echo "markitdown/ changed since $prev:"
            echo "$diff"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ele-autotesting/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (core + ui + web)
        run: pnpm run build:cf

      # Cache 上次 push 的 markitdown image URI. key 含 markitdown/** 内容 hash:
      # - markitdown 未改: key 同 → restore 主键 hit, /tmp/markitdown-image-uri.txt 有内容
      # - markitdown 改了: key 变 → restore miss, 后续 deploy 写新 URI, post-step save 到新 key
      - name: Cache last-deployed markitdown image URI
        id: image_uri_cache
        uses: actions/cache@v4
        with:
          path: /tmp/markitdown-image-uri.txt
          key: markitdown-image-uri-${{ hashFiles('ele-autotesting/containers/markitdown/**') }}

      # reuse 模式: 把 wrangler.jsonc 的 containers[0].image 字段从 Dockerfile 路径换成
      # 上次 push 的 registry URI. wrangler 接受两种形式 (见 wrangler config-schema:
      # "The path to a Dockerfile, or an image URI for the Cloudflare registry."),
      # 用 URI 时不会 build/push, 直接 reference 已有 image.
      - name: Patch wrangler.jsonc to reuse cached image (markitdown unchanged)
        id: patch
        if: |
          startsWith(github.ref, 'refs/tags/') &&
          steps.markitdown.outputs.changed == 'false' &&
          steps.image_uri_cache.outputs.cache-hit == 'true'
        run: |
          if [ ! -s /tmp/markitdown-image-uri.txt ]; then
            echo "cache hit but URI file empty; falling back to rebuild"
            echo "patched=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          uri=$(cat /tmp/markitdown-image-uri.txt)
          jq --arg uri "$uri" '.containers[0].image = $uri' \
            packages/server/wrangler.jsonc > packages/server/wrangler.jsonc.tmp
          mv packages/server/wrangler.jsonc.tmp packages/server/wrangler.jsonc
          echo "wrangler.jsonc patched: containers[0].image = $uri"
          echo "wrangler 将跳过 markitdown docker build + image push (复用 registry 已有 image)"
          echo "patched=true" >> "$GITHUB_OUTPUT"

      # 下面 setup-buildx / Restore / Warm / Persist 仅在需要实际 build 时才跑:
      # - tag push 且 markitdown 改了 (rebuild path)
      # - main push (cache warm-up)
      # reuse path 完全跳过, 不浪费 setup-buildx + 386 MB cache 下载 + warm 的 26s.
      - uses: docker/setup-buildx-action@v3
        if: steps.patch.outputs.patched != 'true'
        with:
          install: true

      - name: Restore buildx layer cache
        id: buildx-cache
        if: steps.patch.outputs.patched != 'true'
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-markitdown-${{ hashFiles('ele-autotesting/containers/markitdown/**') }}
          restore-keys: |
            buildx-markitdown-

      - name: Warm buildkit cache
        if: steps.patch.outputs.patched != 'true'
        run: |
          if [ -d /tmp/.buildx-cache ] && [ -n "$(ls -A /tmp/.buildx-cache 2>/dev/null)" ]; then
            docker buildx build \
              --platform linux/amd64 \
              --cache-from type=local,src=/tmp/.buildx-cache \
              -f containers/markitdown/Dockerfile \
              -t markitdown:warmup \
              --load \
              containers/markitdown
          else
            echo "No buildx cache present, skipping warm step."
          fi

      - name: Apply D1 migrations (remote)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @prompt-optimizer/server exec wrangler d1 migrations apply DB --remote

      # Deploy 始终跑 (tag push). reuse path 下 wrangler.jsonc 已 patched 为 URI,
      # wrangler 看到 image URI 不 build/push container, 只 deploy worker code.
      # rebuild path 下保持 Dockerfile 路径, 正常 build + push.
      # tee 到 /tmp/deploy.log 给下一步解析 image tag.
      - name: Deploy Worker + Container
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          pnpm --filter @prompt-optimizer/server exec wrangler deploy 2>&1 | tee /tmp/deploy.log

      # rebuild path 完成后从 deploy log 捕获新 image tag, 拼成完整 URI 写入 cache 文件.
      # log 里 account id 被 GitHub Actions secrets mask 成 ***, 但 tag (8 位 hex) 不被 mask,
      # 用 ${{ secrets.CLOUDFLARE_ACCOUNT_ID }} 在 step env 重新拼.
      - name: Capture deployed image URI (rebuild path only)
        if: |
          startsWith(github.ref, 'refs/tags/') &&
          steps.markitdown.outputs.changed != 'false'
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          tag=$(grep -oE 'Building image [^[:space:]]+:[a-f0-9]+' /tmp/deploy.log \
            | head -1 | awk -F: '{print $NF}')
          if [ -z "$tag" ]; then
            echo "WARN: could not parse image tag from deploy log; cache will not be updated"
            exit 0
          fi
          uri="registry.cloudflare.com/${CF_ACCOUNT_ID}/ele-autotesting-markitdowncontainer:${tag}"
          echo "$uri" > /tmp/markitdown-image-uri.txt
          echo "captured image URI (account id masked in stdout)"

      # Persist buildx cache: 仅 rebuild path / main push 时跑.
      - name: Persist buildx layer cache
        if: always() && steps.patch.outputs.patched != 'true'
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -f containers/markitdown/Dockerfile \
            --output type=cacheonly \
            containers/markitdown
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
