# 唯一对外反代. 全部转发 gateway; 路径分发 / 鉴权在 gateway 内部完成.
# 保留 Host 头 (gateway 据 request origin 下发 install.sh / callback base URL).
events {}

http {
  upstream gateway {
    server gateway:8080;
  }

  # 上传大文件 (metersphere case multipart) 放宽 body 上限.
  client_max_body_size 50m;

  server {
    listen 80;
    server_name _;

    location / {
      proxy_pass http://gateway;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # SSE / 流式 (harness oneshot, stream-proxy): 关缓冲 + 长超时.
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }
  }
}
